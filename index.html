<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Moi Bros - Naruto</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:sans-serif; }
        canvas { display:block; margin:0 auto; image-rendering:pixelated; max-width:100%; height:auto; }
        #controls { position:fixed; bottom:20px; left:0; right:0; display:flex; justify-content:space-around; z-index:100; }
        button { font-size:28px; padding:15px 30px; margin:5px; border-radius:12px; background:#ff6600; color:white; border:none; box-shadow:0 4px 0 #cc5500; }
        button:active { transform:translateY(4px); box-shadow:0 0 0; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="480"></canvas>

    <div id="controls">
        <button id="leftBtn">←</button>
        <button id="rightBtn">→</button>
        <button id="jumpBtn">SAUT</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
