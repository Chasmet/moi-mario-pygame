<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Super Moi Bros - Naruto</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%; height: 100%; overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
            touch-action: none;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game {
            display: block;
            width: 100vw;
            height: auto;
            max-height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #controls {
            position: fixed;
            left: 0; right: 0;
            bottom: calc(20px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            pointer-events: none;
        }
        .control-group {
            display: flex;
            gap: 14px;
            pointer-events: auto;
        }
        .control-btn {
            width: 84px;
            height: 84px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 24px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 34px;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .control-btn:active, .control-btn.active {
            transform: scale(0.95);
            background: rgba(255, 140, 0, 0.45);
        }
        #jumpBtn { font-size: 20px; }
        #restartBtn {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, 70px);
            padding: 18px 34px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 18px;
            background: #ff6600;
            color: white;
            display: none;
            z-index: 200;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        @media (max-width: 480px) {
            .control-btn { width: 72px; height: 72px; font-size: 28px; }
            #jumpBtn { font-size: 16px; }
        }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="480"></canvas>

    <div id="controls">
        <div class="control-group">
            <button class="control-btn" id="leftBtn">←</button>
            <button class="control-btn" id="rightBtn">→</button>
        </div>
        <div class="control-group">
            <button class="control-btn" id="jumpBtn">SAUT</button>
        </div>
    </div>

    <button id="restartBtn">RESTART</button>

    <script src="game.js"></script>
</body>
</html>
